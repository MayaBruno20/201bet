name: CI

on:
  pull_request:
    branches: [development, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/backend/package-lock.json
            apps/frontend/package-lock.json

      - name: Install Root Deps
        run: npm ci

      - name: Install Backend Deps
        run: npm ci --prefix apps/backend

      - name: Install Frontend Deps
        run: npm ci --prefix apps/frontend

      - name: Lint Backend
        run: npm --prefix apps/backend run lint

      - name: Lint Frontend
        run: npm --prefix apps/frontend run lint

      - name: Test Backend
        run: npm --prefix apps/backend run test

      - name: Build Backend
        run: npm --prefix apps/backend run build

      - name: Build Frontend
        run: npm --prefix apps/frontend run build
