app = "201bet-backend"
primary_region = "gru"

[build]
  dockerfile = "apps/backend/Dockerfile.fly"

[env]
  PORT = "3502"
  NODE_ENV = "production"

[http_service]
  internal_port = 3502
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 400

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
