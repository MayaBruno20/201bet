services:
  postgres:
    image: postgres:16-alpine
    container_name: bet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-betdb}
      POSTGRES_USER: ${POSTGRES_USER:-betuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-betpass}
    ports:
      - '${POSTGRES_PORT:-3504}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-betuser}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bet-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-3505}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    profiles: ['apps']
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    container_name: bet-backend
    restart: unless-stopped
    environment:
      PORT: 3502
      CORS_ORIGIN: http://localhost:3501,http://localhost:3503,http://localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-betuser}:${POSTGRES_PASSWORD:-betpass}@postgres:5432/${POSTGRES_DB:-betdb}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3502:3502'

  frontend:
    profiles: ['apps']
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    container_name: bet-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3502/api
      NEXT_PUBLIC_WS_URL: http://localhost:3502/realtime
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    ports:
      - '3501:3501'

  nginx:
    profiles: ['apps']
    image: nginx:1.27-alpine
    container_name: bet-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - '${NGINX_PORT:-3503}:80'
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
